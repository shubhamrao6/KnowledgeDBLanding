  <!-- Data glow dots on the DB surface -->
  <circle cx="12.5" cy="18" r="1" fill="#ff6b6b" opacity="0.7"/>
  <circle cx="19.5" cy="18" r="1" fill="#e74c3c" opacity="0.7"/>
