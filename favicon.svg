      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="32" x2="32" y2="0" gradientUnits="userSpaceOnUse">
