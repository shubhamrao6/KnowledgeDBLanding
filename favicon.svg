  <!-- Right branch -->
  <path d="M16 11.5 L21 7.5" stroke="url(#g3)" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="22" cy="6.8" r="1.5" fill="url(#g1)" opacity="0.85"/>

  <!-- Top spark node -->
  <circle cx="16" cy="4.5" r="2" fill="url(#g1)"/>

