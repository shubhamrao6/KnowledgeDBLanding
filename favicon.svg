  <!-- AI spark / neural burst rising from the DB -->
  <!-- Center stem -->
  <path d="M16 14.8 L16 6" stroke="url(#g3)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Left branch -->
  <path d="M16 11.5 L11 7.5" stroke="url(#g3)" stroke-width="1.2" stroke-linecap="round"/>
